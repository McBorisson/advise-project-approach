name: Validate skill package

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate checked-in package
        run: python scripts/validate_skill.py

      - name: Rebuild package
        run: python scripts/package_skill.py

      - name: Validate rebuilt package
        run: python scripts/validate_skill.py

      - name: Ensure generated package is committed
        run: git diff --exit-code dist/advise-project-approach.skill
